        // --- CORE UTILITIES & CHART LOGIC ---

        function initCharts() {
            const chartStyles = {
                bar: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { size: 11, weight: 'bold' }, color: '#64748b' } },
                        x: { grid: { display: false }, ticks: { font: { size: 11, weight: 'black' }, color: '#475569' } }
                    }
                },
                pie: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { position: 'right', labels: { font: { size: 12, weight: 'bold' }, boxWidth: 12 } },
                        tooltip: { titleFont: { size: 14 }, bodyFont: { size: 14 } }
                    }
                }
            };

            const phaseCtx = document.getElementById('chartPhase').getContext('2d');
            new Chart(phaseCtx, {
                type: 'doughnut',
                data: {
                    labels: dossier.phases.map(p => p.name),
                    datasets: [{
                        data: dossier.phases.map(p => p.percent),
                        backgroundColor: dossier.phases.map(p => p.color),
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    ...chartStyles.pie,
                    cutout: '70%',
                    onClick: (e, elements) => {
                        if (elements.length > 0) {
                            const index = elements[0].index;
                            const phaseId = dossier.phases[index].id;
                            renderAnalyticsTable(phaseId);
                        } else {
                            renderAnalyticsTable('all');
                        }
                    }
                }
            });

            const alphaVal = dossier.phases.find(p => p.id === 'alpha').percent;
            const ratioCtx = document.getElementById('chartRatio').getContext('2d');
            new Chart(ratioCtx, {
                type: 'bar',
                data: {
                    labels: ['Lipid (Alpha)', 'Solid Matrix'],
                    datasets: [{ data: [alphaVal, 100 - alphaVal], backgroundColor: ['#003d5b', '#cbd5e1'], barThickness: 60 }]
                },
                options: chartStyles.bar
            });

            const loadCtx = document.getElementById('chartLoad').getContext('2d');
            const epVal = dossier.phases.find(p => p.id === 'epsilon').percent;
            const zVal = dossier.phases.find(p => p.id === 'zeta').percent;
            const traceVal = dossier.phases.find(p => p.id === 'delta').percent;
            new Chart(loadCtx, {
                type: 'bar',
                data: {
                    labels: ['Bio-Matrix', 'Carrier', 'Trace API'],
                    datasets: [{ data: [epVal, zVal, traceVal], backgroundColor: ['#2e8b57', '#94a3b8', '#d1495b'], barThickness: 40 }]
                },
                options: chartStyles.bar
            });

            const abCtx = document.getElementById('chartAB').getContext('2d');
            const betaVal = dossier.phases.find(p => p.id === 'beta').percent;
            new Chart(abCtx, {
                type: 'bar',
                data: {
                    labels: ['Binder (Alpha)', 'Mineral (Beta)'],
                    datasets: [{ data: [alphaVal, betaVal], backgroundColor: ['#003d5b', '#00798c'], barThickness: 60 }]
                },
                options: chartStyles.bar
            });
        }

        function renderAnalyticsTable(filterId) {
            const table = document.getElementById('analyticsTable');
            const title = document.getElementById('filterTitle');
            const data = filterId === 'all' ? dossier.ingredients : dossier.ingredients.filter(i => i.phase === filterId);
            
            title.innerText = filterId === 'all' ? "Phase Content: All Ingredients" : `Phase Content: ${filterId.toUpperCase()}`;

            table.innerHTML = `
                <thead class="bg-slate-50 font-black text-slate-400 uppercase tracking-widest text-2xs border-b border-slate-100">
                    <tr><th class="px-8 py-4 text-left">Ingredient</th><th class="px-8 py-4 text-right">Mass %</th><th class="px-8 py-4 text-right">Type</th></tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    ${data.map(i => `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-8 py-4 font-bold text-slate-700">${i.name}</td>
                            <td class="px-8 py-4 text-right font-mono font-black text-primary">${i.percent.toFixed(4)}%</td>
                            <td class="px-8 py-4 text-xs font-black uppercase text-slate-400 text-right">${i.phase}</td>
                        </tr>
                    `).join('')}
                </tbody>
            `;
        }

        function exportCSV(type) {
            let csv = "";
            let filename = `Growlrr_${type}_v6.8.csv`;

            if (type === 'BOM') {
                csv = "Ingredient,Mass Percent,CAS,Phase,Status\n";
                dossier.ingredients.forEach(i => csv += `${i.name},${i.percent}%,${i.cas},${i.phase},${i.status}\n`);
            } else if (type === 'SOP') {
                csv = "Phase ID,Title,Instruction,Safety Check\n";
                sops.forEach(p => p.items.forEach(i => csv += `${p.id},${p.title},${i.act},${i.check}\n`));
            } else if (type === 'COA') {
                csv = "Ingredient,CAS,Assay Purity,Particle Size,Tolerance\n";
                dossier.ingredients.forEach(i => csv += `${i.name},${i.cas},"${i.assay}","${i.particle}",${i.tolerance}\n`);
            }

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", filename);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function setActiveNav(id) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const navBtn = document.getElementById(`nav-${id}`);
            if(navBtn) navBtn.classList.add('active');
        }

        document.addEventListener('DOMContentLoaded', () => {
