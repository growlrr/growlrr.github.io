                csv = "CatCore Ingredient,Cat %,DogCore Ingredient,Dog %\n";
                MASTER_DATA.cat.ingredients.forEach(ci => {
                    const di = MASTER_DATA.dog.ingredients.find(d => d.name.split('*')[0] === ci.name.split('*')[0]) || { name: '-', percent: 0 };
                    csv += `${ci.name},${ci.percent}%,${di.name},${di.percent}%\n`;
                });
            }
            const b = new Blob([csv], { type: 'text/csv' }); const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = `Growlrr_${type}_v7.csv`; a.click();
        }

        function setActiveNav(id) { document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active')); const btn = document.getElementById(`nav-${id}`); if(btn) btn.classList.add('active'); }
        window.onload = () => { renderView('overview'); };
    </script>
</body>
</html>
