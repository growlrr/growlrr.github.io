                                <p class="text-slate-400 text-xs leading-relaxed">CDMO must maintain complete lot traceability for all components and verify the COA from qualified vendors. Change of vendors after production would require written communication.</p>
                            </div>
                            <div class="bg-[#1e293b]/50 p-6 rounded-xl text-left md:col-span-2">
                                <h4 class="text-white font-bold text-[11px] uppercase tracking-widest mb-3 flex items-center gap-2"><span class="text-blue-400">●</span> Bio-Matrix Gating & Testing</h4>
                                <p class="text-slate-400 text-xs leading-relaxed"> Every incoming batch must have clear  vendor provided third-party COA  for  microbial panel (<i>Salmonella spp.</i> and <i>E. coli</i>) before release. In addition to vendor COA, Sardine meal and organ inputs require mandatory quarterly spot-checks for heavy metals (Pb, As, Cd, Hg) and Aflatoxins.</p>
                            </div>
                        </div>
                    </section>
                </div>
            `;
        }

        async function renderDownloads(t) {
            t.innerHTML = `<div class="p-20 text-center"><div class="animate-pulse text-blue-400 font-black tracking-widest text-sm uppercase text-left text-left">Synchronizing Master Cloud Ledger...</div></div>`;
            t.innerHTML = `
                <div class="fade-in max-w-7xl mx-auto space-y-12 pb-20 text-sm text-left">
                    <div class="flex justify-between items-end text-left"><div><h2 class="text-2xl font-black text-blue-400 uppercase tracking-tight text-left">External Assets</h2><p class="text-sm font-bold text-slate-500 uppercase mt-1 text-left">Secure Cloud Access Portal</p></div>${isAdmin ? `<button onclick="showAdminAssetUpdate()" class="bg-blue-600 text-white px-5 py-2.5 rounded font-black text-xs uppercase hover:bg-blue-500 transition-all text-left">⚙️ Manage Master Links</button>` : ''}</div>
                    <div class="grid md:grid-cols-2 gap-12 text-left">
                        ${['cat', 'dog'].map(p => `
                            <div class="flex flex-col items-center text-left">
                                <div class="doc-thumbnail border-${p === 'cat' ? 'blue' : 'emerald'}-600 border-t-8 rounded-b-lg flex flex-col items-center justify-center text-left" onclick="window.open('${MASTER_DATA[p].link}', '_blank')">
                                    <div class="doc-corner"></div><div class="text-5xl mb-3 text-black text-left">📄</div><div class="text-[#0f172a] font-black text-center px-4 leading-tight text-[11px] uppercase text-center">${MASTER_DATA[p].name} Spec</div>
                                </div>
                                <div class="mt-6 w-full max-w-[240px] bg-surface p-5 rounded-xl border border-white/5 space-y-2 text-left">
                                    <div class="flex items-center justify-between text-left"><span class="text-emerald-400 font-black text-[10px] uppercase text-left">Active</span><span class="text-slate-600 font-bold text-[9px] uppercase text-right">Synced</span></div>
                                    <div class="text-white font-bold text-xs text-left">${MASTER_DATA[p].rev}</div>
                                    <div class="text-slate-500 text-[9px] font-medium leading-tight text-left">Last Synced: ${MASTER_DATA[p].lastSynced}</div>
                                    <div class="pt-2 border-t border-white/5 flex flex-col gap-1 text-[9px] text-slate-600 font-bold uppercase text-left"><span>Prev Rev: ${MASTER_DATA[p].prevRev}</span><span>Archived: ${MASTER_DATA[p].prevSynced}</span></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderAnalytics(t, r) {
            t.innerHTML = `
                <div class="fade-in max-w-7xl mx-auto space-y-10 pb-20 text-sm text-left">
                    <div class="mb-6 text-left"><h2 class="text-2xl font-black text-blue-400 uppercase tracking-tight text-left">Formulation Analytics</h2><p class="text-sm font-bold text-slate-500 uppercase mt-1 text-left">Matrix Structure & Load Distribution</p></div>
                    <div class="grid lg:grid-cols-2 gap-8 text-left"><div class="bg-surface p-8 rounded-2xl shadow-lg border border-white/5 text-left"><h4 class="text-2xs font-black text-slate-500 uppercase tracking-widest mb-6 text-left">Phase Load (Click Doughnut to Filter)</h4><div class="chart-container"><canvas id="chartPhase"></canvas></div></div><div class="bg-surface p-8 rounded-2xl shadow-lg border border-white/5 text-left text-left"><h4 class="text-2xs font-black text-slate-500 uppercase tracking-widest mb-6 text-left text-left">Solid vs Lipid Binder Ratio</h4><div class="chart-container"><canvas id="chartRatio"></canvas></div></div></div>
                    <div id="analyticsFilterSection" class="bg-surface rounded-2xl shadow-xl border border-white/5 overflow-hidden text-left text-left">
                        <div class="bg-deep px-8 py-5 border-b border-white/5 flex justify-between items-center text-left"><h3 class="text-xs font-black text-white uppercase text-left" id="filterTitle">Phase Content: All Ingredients</h3><button onclick="updateAnalyticsTable('all')" class="text-2xs font-black text-emerald-400 uppercase border-b-2 border-emerald-500 text-left text-left">Reset View</button></div>
                        <div class="overflow-x-auto max-h-[500px] text-left text-left text-left text-left"><table class="w-full text-left text-left text-left text-left text-left text-left" id="analyticsTable"></table></div>
                    </div>
                </div>
            `;
            initCharts(); updateAnalyticsTable('all');
        }

        function renderProcess(t, r) {
            t.innerHTML = `
                <div class="fade-in max-w-5xl mx-auto space-y-8 pb-20 text-sm text-left">
                    <div class="flex justify-between items-end text-left text-left"><div><h2 class="text-2xl font-black text-blue-400 uppercase tracking-tight text-left">Phase-Wise SOP</h2><p class="text-sm font-bold text-slate-500 uppercase mt-1 text-left">Technical Manufacturing Protocol (Batch Record Template)</p></div><button onclick="exportCSV('SOP')" class="bg-blue-600 text-white px-5 py-2.5 rounded font-black text-xs uppercase hover:bg-blue-500 transition-all flex items-center gap-2 text-left"><span>📥</span> Export SOP CSV</button></div>
                    ${r.sops.map(p => {
                        if (p.isPress) {
                            return `
                            <div class="bg-surface rounded-2xl shadow-lg border border-white/5 overflow-hidden text-sm mb-6 text-left">
                                <div class="bg-card px-8 py-4 border-b border-white/5 text-left"><h4 class="font-black text-white uppercase text-sm text-left">${p.phase}</h4></div>
                                <table class="w-full text-left sop-table text-sm text-left">
                                    <thead class="text-2xs font-black text-slate-500 uppercase tracking-widest bg-black/20 border-b border-white/5 text-left"><tr><th class="px-6 py-3 text-left">Parameter</th><th class="px-6 py-3 text-left">Specification</th><th class="px-6 py-3 text-right">Critical Check / Verify</th></tr></thead>
                                    <tbody class="divide-y divide-white/5 text-left">${p.acts.map(item => `<tr><td class="px-6 py-5 font-bold text-white text-left">${item.step}</td><td class="px-6 py-5 text-slate-300 text-left">${item.text}</td><td class="px-6 py-5 text-xs text-emerald-400 text-right italic font-medium leading-relaxed">${item.check}</td></tr>`).join('')}</tbody>
                                </table>
                            </div>`;
                        } else {
                            return `
                            <div class="bg-surface rounded-2xl shadow-lg border border-white/5 overflow-hidden text-sm mb-6 text-left">
                                <div class="bg-card px-8 py-4 border-b border-white/5 text-left"><h4 class="font-black text-white uppercase text-sm text-left">${p.phase}</h4></div>
                                <table class="w-full text-left sop-table text-sm text-left">
                                    <thead class="text-2xs font-black text-slate-500 uppercase tracking-widest bg-black/20 border-b border-white/5 text-left"><tr><th class="px-6 py-3 w-12 text-center">#</th><th class="px-6 py-3 text-left">Action Details</th><th class="px-6 py-3 text-center">Qty (Actual)</th><th class="px-6 py-3 text-right">Critical Check / Verify</th></tr></thead>
                                    <tbody class="divide-y divide-white/5 text-left">${p.acts.map(item => `<tr><td class="px-6 py-5 text-center text-slate-500 font-bold">${item.step}</td><td class="px-6 py-5 text-slate-300 text-left">${item.text}</td><td class="px-6 py-5 text-center"><input type="text" placeholder="0.000 g" class="bg-black/30 border border-slate-700 text-center text-emerald-400 outline-none w-24 px-2 py-1 rounded focus:border-blue-500"></td><td class="px-6 py-5 text-xs text-emerald-400 text-right italic font-medium leading-relaxed">${item.check}</td></tr>`).join('')}</tbody>
                                </table>
                            </div>`;
                        }
                    }).join('')}
                </div>
            `;
        }

        function renderQuality(t, r) {
            t.innerHTML = `
                <div class="fade-in max-w-7xl mx-auto space-y-10 pb-20 text-sm text-left">
                    <div class="flex justify-between items-end text-left text-left"><div><h2 class="text-2xl font-black text-blue-400 uppercase tracking-tight text-left">Quality Release Standards</h2><p class="text-sm font-bold text-slate-500 uppercase mt-1 text-left">Incoming Raw Material Specifications</p></div><button onclick="exportCSV('COA')" class="bg-blue-600 text-white px-5 py-2.5 rounded font-black text-xs uppercase flex items-center gap-2 transition-all text-left text-left text-left"><span>📥</span> Export QC CSV</button></div>
                    <div class="bg-[#0f172a] rounded-2xl shadow-xl border border-white/5 overflow-hidden text-left"><div class="overflow-x-auto text-left text-left">
                        <table class="w-full text-left text-sm text-left text-left text-left text-left">
                            <thead class="bg-[#1e293b] font-black text-white uppercase tracking-widest border-b border-white/5 text-[11px] text-left text-left">
                                <tr><th class="px-6 py-4 text-left">Ingredient</th><th class="px-6 py-4 text-left">CAS Number</th><th class="px-6 py-4 text-left">Assay / Purity Spec</th><th class="px-6 py-4 text-left">Physical Form</th><th class="px-6 py-4 text-right">Weight Tol.</th></tr>
                            </thead>
                            <tbody class="divide-y divide-white/5 text-slate-300 text-left text-left">
                                ${r.ingredients.map(i => `<tr class="hover:bg-white/5 transition-colors"><td class="px-6 py-4 font-bold text-white text-sm">${i.name}</td><td class="px-6 py-4 text-xs font-mono text-slate-400">${i.cas}</td><td class="px-6 py-4 text-slate-300 leading-relaxed">${i.assay}</td><td class="px-6 py-4 text-slate-300">${i.particle}</td><td class="px-6 py-4 text-emerald-400 text-right font-bold">${i.tolerance}</td></tr>`).join('')}
                            </tbody>
                        </table>
                    </div></div>
                </div>
            `;
        }

        // --- AUTH & CHART UTILS ---
        function openSecureGate() { document.getElementById('passkeyModal').classList.remove('hidden'); document.getElementById('passkeyInput').focus(); }
        function closeSecureGate() { document.getElementById('passkeyModal').classList.add('hidden'); }
        async function verifyPasskey() {
            const input = document.getElementById('passkeyInput').value.trim(); const hash = btoa(input);
            if (hash === globalConfig.VAULT.k || hash === globalConfig.VAULT.ak) {
                isAuthenticated = true; if (hash === globalConfig.VAULT.ak) isAdmin = true;
                closeSecureGate(); renderView(window.pendingView || 'overview');
                try { if (window.CloudLedger) await window.CloudLedger.signInAnonymously(window.CloudLedger.auth); } catch (e) {}
            } else { document.getElementById('passkeyError').classList.remove('hidden'); }
        }

        function initCharts() {
            const data = MASTER_DATA[activeProduct]; const phaseCounts = globalConfig.phases.map(p => data.ingredients.filter(i => i.phase === p.id).length);
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(document.getElementById('chartPhase').getContext('2d'), { type: 'doughnut', data: { labels: globalConfig.phases.map(p => p.name), datasets: [{ data: phaseCounts, backgroundColor: globalConfig.phases.map(p => p.color), borderWidth: 2, borderColor: '#020617' }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 10, weight: 'bold' } } } }, onClick: (e, el) => { if (el.length > 0) updateAnalyticsTable(globalConfig.phases[el[0].index].id); else updateAnalyticsTable('all'); } } });
            
            // Adjust lipid/solid ratio for visual representation based on phase logic
            let lipidPct = 0; let solidPct = 0;
            data.ingredients.forEach(i => { if(i.phase === 'alpha') lipidPct += i.percent; else solidPct += i.percent; });
            
            new Chart(document.getElementById('chartRatio').getContext('2d'), { type: 'bar', data: { labels: ['Lipid binder', 'Solid Scaffold'], datasets: [{ data: [lipidPct, solidPct], backgroundColor: ['#60a5fa', '#334155'], barThickness: 60 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#64748b' } }, x: { grid: { display: false }, ticks: { color: '#64748b' } } } } });
        }

        function updateAnalyticsTable(id) {
            const table = document.getElementById('analyticsTable'); const data = id === 'all' ? MASTER_DATA[activeProduct].ingredients : MASTER_DATA[activeProduct].ingredients.filter(i => i.phase === id);
            document.getElementById('filterTitle').innerText = id === 'all' ? "Phase Content: All Ingredients" : `Phase Content: ${id.toUpperCase()}`;
            table.innerHTML = `<thead class="bg-[#1e293b] font-black text-white uppercase tracking-widest text-2xs border-b border-white/5 text-left text-left text-left text-left text-left text-left"><tr><th class="px-8 py-4 text-left text-[11px]">Ingredient</th><th class="px-8 py-4 text-right text-[11px]">Mass %</th><th class="px-8 py-4 text-right text-[11px]">Type</th></tr></thead><tbody class="divide-y divide-white/5 text-sm text-slate-300 font-bold text-left text-left text-left">${data.map(i => `<tr class="hover:bg-white/5 text-left text-left"><td class="px-8 py-4 font-bold text-white text-left text-left">${i.name}</td><td class="px-8 py-4 text-right font-mono text-emerald-400 text-sm text-right text-right text-right">${i.percent.toFixed(4)}%</td><td class="px-8 py-4 text-2xs font-black uppercase text-slate-500 text-right text-[10px] text-right text-right">${i.phase}</td></tr>`).join('')}</tbody>`;
        }

        function exportCSV(type) {
            let csv = "";
            if (type === 'BOM') { csv = "Ingredient,Mass %,Phase,Status\n"; MASTER_DATA[activeProduct].ingredients.forEach(i => csv += `"${i.name}",${i.percent.toFixed(4)}%,${i.phase},${i.status}\n`); }
            else if (type === 'UNIFIED') {
                csv = "CatCore Ingredient,Cat %,DogCore Ingredient,Dog %\n";
                UNIFIED_TABLE_DATA.forEach(u => {
                    csv += `"${u.cName}",${u.cPct.toFixed(4)}%,"${u.dName}",${u.dPct.toFixed(4)}%\n`;
                });
            }
            else if (type === 'COA') {
                csv = "Ingredient,CAS Number,Assay / Purity Spec,Physical Form,Weight Tolerance\n";
                MASTER_DATA[activeProduct].ingredients.forEach(i => csv += `"${i.name}","${i.cas}","${i.assay}","${i.particle}","${i.tolerance}"\n`);
            }
            else if (type === 'SOP') {
                csv = "Phase,Step,Action,Critical Check\n";
                MASTER_DATA[activeProduct].sops.forEach(p => {
                    p.acts.forEach(a => csv += `"${p.phase}","${a.step}","${a.text}","${a.check}"\n`);
                });
            }
            const b = new Blob([csv], { type: 'text/csv' }); const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = `Growlrr_${type}_v8_2.csv`; a.click();
        }

        function setActiveNav(id) { document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active')); const btn = document.getElementById(`nav-${id}`); if(btn) btn.classList.add('active'); }
        window.onload = () => { renderView('overview'); };
    </script>
</body>
</html>
